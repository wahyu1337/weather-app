<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
    <title>Weather App</title>
    </head>
    <body>
    <div id="container">
      <!-- header -->
      <div id="header">
        <div id="left-header">
          <p>Ways - Weather Apps</p>
        </div>
        <div id="right-header">
          <p>Theme</p>
          <button id="darkmode">
            <span class="material-symbols-outlined" id="theme">dark_mode</span>
          </button>
        </div>
      </div>
      <!-- content -->
      <div id="content">
        <!-- Search box & Input text-->
        <div id="inputContent">
          <input type="text" name="input" id="input" placeholder="Search">
          <button id="btnSearch">
            <span class="material-symbols-outlined">search</span>
          </button>
        </div>
        <!-- City/Country title -->
        <div id="location"><span id="cityName">test</span>(<span id="country">indonesia</span>)</div>
        <!-- Detail weather -->
        <div id="detailContent">          
          <div id="icon">test</div>
          <div id="description">
            <div id="temp">
              <div id="title">Temperature</div>
              <div id="value">2</div>
            </div>
            <div id="humidity">
              <div id="title">Humidity</div>
              <div id="value">2</div>
            </div>
            <div id="pressure">
              <div id="title">Pressure</div>
              <div id="value">2</div>
            </div>
            <div id="wind">
              <div id="title">Wind Speed</div>
              <div id="value">2</div>
            </div>   
          </div>    
        </div>
      </div>
      <footer id="footer"></footer>
    </div>
  </body>
</html>
